<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мій сайт{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        nav { background: #333; color: white; padding: 1rem; text-align: center; }
        .container { padding: 20px; max-width: 800px; margin: auto; background: white; min-height: 80vh; }
        footer { text-align: center; padding: 10px; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>

    <nav>
        <strong>Мій Flask Додаток</strong> |
        <a href="/" style="color: white;">Головна</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        &copy; 2026 Навчальний проект hillel_project
    </footer>

</body>
</html>
